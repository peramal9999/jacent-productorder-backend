user:
  queries:
    user-by-email: SELECT user_id, email, first_name, last_name, password_hash as password, enabled, locked FROM users WHERE email = ?
    email-exists: SELECT EXISTS(SELECT 1 FROM users WHERE email = ?)
    create-user: INSERT INTO users (first_name, last_name, email, password_hash, enabled, locked, created_at, updated_at)
                  VALUES (?, ?, ?, ?, ?, ?, NOW(), NOW())

