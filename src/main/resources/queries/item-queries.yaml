item:
  queries:
    divisions: SELECT DIVISION_NAME_ID, DIVISION, DIVNAME FROM division ORDER BY DIVISION_NAME_ID
    commodities: SELECT COMMODITY_ID, COMMODITY FROM commodity
    itemCount: |
            SELECT
              COUNT(*)
            FROM 
              fact_store_authorized_items fsai,
              products p
            WHERE
               p.PRODUCT_ID = fsai.ITEM_ID AND
               fsai.STORE_ID = :storeId
    allItems: |
      SELECT
      DIVISION_NAME_ID as division,
      COMMODITY_ID as COMMODITY,
      p.UPC_CODE,
      p.PRODUCT_ID ITEM_ID,
      p.PRODUCT_NAME ITEM_NAME,
      p.PRODUCT_DESC ITEM_DESC,
      PRICE,
      RETAIL_PRICE
      FROM 
        fact_store_authorized_items fsai,
        products p
      WHERE
         p.PRODUCT_ID = fsai.ITEM_ID AND
         fsai.STORE_ID = :storeId
      LIMIT :size OFFSET :offset
